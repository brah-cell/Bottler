name: Release

# Push a tag like "v1.0.0" to trigger this. It builds Bottler.app on a real
# macOS runner, zips it, and attaches it to a new GitHub Release — no local
# build required.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to release (e.g. v1.0.0) — only used for manual runs"
        required: true
        default: "v1.0.0"

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build Bottler.app
        run: |
          chmod +x build_app.sh
          ./build_app.sh

      - name: Zip app bundle (preserving bundle structure/attributes)
        run: ditto -c -k --keepParent Bottler.app Bottler.zip

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Bottler ${{ steps.tag.outputs.tag }}"
          files: Bottler.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
